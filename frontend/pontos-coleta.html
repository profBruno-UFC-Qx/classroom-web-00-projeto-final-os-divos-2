<body>

            </div>
        </div>

        <nav class="menu">
            <a href="dashboard.html">

            </a>

            <a href="pontos-coleta.html" class="active">
                <i class="bi bi-geo-alt"></i>
                Pontos de Coleta
            </a>

            <a href="#">
                <i class="bi bi-truck"></i>

            </a>

            <a href="#">
                <i class="bi bi-recycle"></i>

            </a>
        
            <a href="#">
                <i class="bi bi-book"></i>

            </a>

            <a href="#">

            <a href="login.html">

            </a>
    </nav>

        <p>Faça sua parte por uma Quixadá mais sustentável.</p>
    </div>
    </aside>

        <div>
            <h2>Mapa de Pontos de Coleta</h2>
            <p>Encontre pontos de coleta e catadores próximos de você.</p>

        <button class="filter-button active-filter">

            <i class="bi bi-bag-fill plastic"></i>

        </button>

        <button class="filter-button">
            <i class="bi bi-bottle plastic-green"></i>

        </button>

        <button class="filter-button">
            <i class="bi bi-file-earmark-text paper"></i>
            Papel
        </button>

        <button class="filter-button">
