<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login</title>

  <link rel="stylesheet" href="css/styler.css">
</head>

<body>
<main class="container">

  <section class="left-side">

    <div class="logo">
      <h2>♻ Recicla Quixadá</h2>
    </div>

    <div class="content-left">

      <h1>
        Descarte certo,<br>
        futuro melhor!
      </h1>

      <p>
        Conectamos você a pontos de coleta, catadores
        e informações para tornar Quixadá mais sustentável.
      </p>

      <img
        src="assets/imagem-login.png"
        alt="Reciclagem"
        class="illustration"
      >

    </div>

  </section>

  <section class="right-side">
     <div class="form-container">

  <div class="top-link">

    <p>
      Ainda não tem uma conta?
    </p>

    <button type="button">
      Cadastre-se
    </button>

  </div>

  <h2>Entrar</h2>

  <p>
    Acesse sua conta para continuar
  </p>

  <form>

    <div class="form-group">

      <label>E-mail</label>

      <input
        type="email"
        placeholder="seu@email.com"
      >

    </div>

    <div class="form-group">

      <label>Senha</label>

      <input
        type="password"
        placeholder="Digite sua senha"
      >

    </div>

    <button type="submit">
      Entrar
    </button>

    <button type="button">
      Entrar com Google
    </button>

  </form>

</div>
  </section>

</main>
</body>

</html>
