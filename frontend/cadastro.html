<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cadastro</title>

  <link rel="stylesheet" href="css/styler.css">
</head>

<body>

  <main class="container">

    <section class="left-side">

      <div class="logo">
        <h2>♻ Recicla Quixadá</h2>
      </div>

      <div class="content-left">

        <h1>
          Descarte certo,<br>
          futuro melhor!
        </h1>

        <p>
          Crie sua conta e faça parte de uma comunidade
          que transforma Quixadá em uma cidade mais sustentável.
        </p>

      </div>

    </section>

    <section class="right-side">

      <div class="form-container">

        <h2>Criar conta</h2>

        <p>
          Preencha os dados abaixo para se cadastrar
        </p>

        <form>

       <div class="user-types">

              <button type="button">
                Cidadão
              </button>
            
              <button type="button">
                Catador/Coletor
              </button>

            <button type="button">
              Comércio/Escola
            </button>

            </div>
         

          <div class="form-group">
            <label>Nome completo</label>

            <input
              type="text"
              placeholder="Digite seu nome completo"
            >
          </div>

          <div class="form-group">
            <label>E-mail</label>

            <input
              type="email"
              placeholder="seu@email.com"
            >
          </div>

          <div class="form-group">
            <label>CPF</label>

            <input
              type="text"
              placeholder="000.000.000-00"
            >
          </div>

          <div class="form-group">
            <label>Senha</label>
            <div class="form-group">
  <label>Telefone</label>

  <input
    type="text"
    placeholder="(88) 99999-9999"
  >
</div>

<div class="form-group">
  <label>Endereço</label>

  <input
    type="text"
    placeholder="Digite seu endereço"
  >
</div>

<div class="form-group">
  <label>Confirmar senha</label>

  <input
    type="password"
    placeholder="Confirme sua senha"
  >
</div>

<div class="checkbox-group">

  <input type="checkbox">

  <p>
    Li e aceito os termos de uso
  </p>

</div>

            <input
              type="password"
              placeholder="Crie uma senha"
            >
          </div>

          <button type="submit">
            Cadastrar
          </button>

        </form>
        <div class="user-types">

  <button type="button">
    Cidadão
  </button>

  <button type="button">
    Catador/Coletor
  </button>

  <button type="button">
    Comércio/Escola
  </button>

</div>
  <button type="submit">
    Cadastrar
  </button>

  <button type="button">
    Cadastrar com Google
  </button>

</form>
      </div>

    </section>

  </main>

</body>

</html>
